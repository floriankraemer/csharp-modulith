services:
  # .NET SDK + devuser (Dockerfile.dev); keep running for `docker compose exec -T csharp ...`
  csharp:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        DEV_UID: ${DEV_UID:-1000}
        DEV_GID: ${DEV_GID:-1000}
    image: csharp-modulith-dev:latest
    volumes:
      - .:/src
    working_dir: /src
    command: ["sleep", "infinity"]

  host:
    build:
      context: .
      dockerfile: Dockerfile
    image: csharp-modulith-host:latest
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
